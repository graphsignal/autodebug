type: service
name: sglang-autodebug

image: lmsysorg/sglang:latest
env:
  - MODEL_ID=Qwen/Qwen1.5-0.5B-Chat
  - GRAPHSIGNAL_API_KEY

commands:
  - |
    pip install --no-cache-dir 'graphsignal[cu12]' && \
    graphsignal-run python3 -m sglang.launch_server \
      --model-path $MODEL_ID \
      --port 8000 \
      --trust-remote-code \
      --num-continuous-decode-steps 8 \
      --enable-mixed-chunk \
      --schedule-policy lpm

port: 8000
model: Qwen/Qwen1.5-0.5B-Chat

volumes:
  - instance_path: /dstack-cache
    path: /root/.cache
    optional: true

resources:
  gpu: H100

fleets:
  - fleet-cloud-01
